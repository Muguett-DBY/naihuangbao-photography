name = "naihuangbao-photography"
pages_build_output_dir = "dist"
compatibility_date = "2026-05-17"
compatibility_flags = ["nodejs_compat"]

# Required Pages secrets are documented in README.md.
# Do not put secret values in [vars].

[[r2_buckets]]
binding = "PHOTO_BUCKET"
bucket_name = "naihuangbao-photography"

[[kv_namespaces]]
binding = "CACHE"
id = "7824c3fdacda4e28b7fceb9ee4fa7987"

[[d1_databases]]
binding = "DB"
database_name = "naihuangbao-photography"
database_id = "e052d4a9-d8aa-4a34-aee0-c328ac2e23dc"
migrations_dir = "db/migrations"
